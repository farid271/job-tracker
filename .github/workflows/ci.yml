name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend API Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jobtracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install backend dependencies
        run: cd backend && npm install

      - name: Run API tests
        run: cd backend && npm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/jobtracker
          NODE_ENV: test

  frontend-tests:
    name: Frontend Playwright Tests
    runs-on: ubuntu-latest
    needs: backend-tests

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jobtracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install backend dependencies
        run: cd backend && npm install

      - name: Start backend
        run: cd backend && node index.js &
        env:
          PORT: 3001
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/jobtracker

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps

      - name: Wait for backend
        run: cd frontend && npx wait-on http://localhost:3001/health --timeout 30000

      - name: Start frontend dev server
        run: cd frontend && npm run dev &

      - name: Wait for frontend
        run: cd frontend && npx wait-on http://localhost:5173 --timeout 30000

      - name: Run Playwright tests
        run: cd frontend && npx playwright test
        env: 
          VITE_API_URL: http://localhost:3001

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: frontend-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build with Docker Compose
        run: docker compose build